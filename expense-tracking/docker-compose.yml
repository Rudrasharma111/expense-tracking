services:
  # database Setup
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # run init.sl file automaticaly
      - ./sql:/docker-entrypoint-initdb.d

  # Our pyhton app
  app:
    build: .
    depends_on:
      - db
    environment:
      # get password   .env file
      DB_HOST: db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      # link dataFolder read csv
      - ./data:/app/data